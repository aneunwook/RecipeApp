# ---------------------------
# 워크플로우 이름
name: CI - Build & Test

# ---------------------------
# 언제 워크플로우를 실행할지 지정
on:
  pull_request:
    branches: [ main, dev ]   # main/dev/feature 브랜치로 PR 생성/수정 시 자동 실행
  push:
    branches: [ main, dev ]                 # main/dev 브랜치에 push 발생 시 자동 실행

jobs:
  build:
    runs-on: ubuntu-latest   # 깃허브에서 제공하는 최신 Ubuntu 리눅스 서버에서 실행

    steps:
      # ---------------------------
      # 1. 내 코드 내려받기
      - name: Checkout code
        uses: actions/checkout@v4

      # ---------------------------
      # 2. Java 17 환경 구성 (temurin은 오라클 무료 JDK)
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # ---------------------------
      # 3. Gradle 의존성 캐시(=빌드속도↑, 네트워크↓)
      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: ~/.gradle/caches
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      # ---------------------------
      # 4. gradlew 실행 권한 부여(유닉스 환경에서는 필수)
      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      # ---------------------------
      # 5. 테스트 코드 전부 실행(JUnit 기준)
      - name: Run Tests
        run: ./gradlew test --info --build-cache

      # ---------------------------
      # 6. 전체 빌드(JAR 패키징까지 수행)
      - name: Build
        run: ./gradlew build --info --build-cache

      # ---------------------------
      # 7. (선택) 빌드된 JAR 파일을 Github에 산출물로 업로드
      - name: Upload Jar
        uses: actions/upload-artifact@v4
        with:
          name: app
          path: build/libs/*.jar   # build/libs 폴더의 모든 jar 파일 업로드

  deploy:
    needs: build    # build가 끝난 뒤에 실행
    runs-on: ubuntu-latest

    steps:
      - name: Download JAR from artifact
        uses: actions/download-artifact@v4
        with:
          name: app

      # JAR 파일 EC2로 복사
      - name: SCP JAR to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_PRIVATE_KEY }}
          source: "*.jar"
          target: "/home/ubuntu/app"   # 원하는 경로로

      # EC2에서 서버 재시작 (기존 서버 kill & 새로 실행)
      - name: Restart Spring Boot on EC2
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_PRIVATE_KEY }}
          script: |
            export JWT_SECRET_KEY=IfthisgetsstolenitsabigproblemIfthelengthistooshortthesecurityisnotsufficientsoanerroroccurs
            pkill -f 'java -jar' || true
            nohup java -jar /home/ubuntu/app/*.jar > /home/ubuntu/app/app.log 2>&1 &