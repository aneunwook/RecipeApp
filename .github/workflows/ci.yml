name: Continuous Integration

on:
  pull_request:
    branches:
      - dev   # dev 브랜치 기준 PR만 감지(원하면 main으로 바꿔도 됨)

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Build & Test
        run: ./gradlew clean build --stacktrace --info --build-cache